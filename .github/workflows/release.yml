name: Build and Release

on:
  push:
    branches: [main, master]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            arch: x64
            rust_target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            arch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - platform: macos-latest
            arch: arm64
            rust_target: aarch64-apple-darwin
          - platform: windows-latest
            arch: x64
            rust_target: x86_64-pc-windows-msvc
          - platform: windows-11-arm
            arch: arm64
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*
          if-no-files-found: error

  publish-release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          draft: ${{ github.event.release.draft }}
          prerelease: ${{ github.event.release.prerelease }}

  publish-nightly:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete old nightly release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --repo ${{ github.repository }} || true
          git push --delete origin nightly || true

      - name: Upload to nightly release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: Nightly Build
          body: |
            Automated nightly build from commit `${{ github.sha }}`.

            This is a pre-release build and may be unstable.
          prerelease: true
          make_latest: false
